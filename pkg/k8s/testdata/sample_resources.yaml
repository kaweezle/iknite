apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-config
  namespace: default
  labels:
    app: sample
data:
  app.properties: |
    log.level=info
    server.port=8080
  feature.flags: |
    enable_cache=true
    enable_metrics=true
---
apiVersion: v1
kind: Secret
metadata:
  name: sample-secret
  namespace: default
  labels:
    app: sample
type: Opaque
data:
  username: c2FtcGxldXNlcg==
  password: c2VjcmV0cGFzc3dvcmQ=
---
apiVersion: v1
kind: Service
metadata:
  name: sample-service
  namespace: default
  labels:
    app: sample
spec:
  selector:
    app: sample
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-deployment
  namespace: default
  labels:
    app: sample
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample
  template:
    metadata:
      labels:
        app: sample
    spec:
      containers:
        - name: sample
          image: nginx:1.27
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: sample-config
            - secretRef:
                name: sample-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sample-read-config
  labels:
    app: sample
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
    verbs:
      - get
      - list
      - watch
