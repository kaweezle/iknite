apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kgateway
  namespace: argocd
  annotations:
    autocloud/local-application: "true"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: kgateway-system
    server: https://kubernetes.default.svc
  project: default
  source:
    path: deploy/k8s/argocd/common/kgateway
    repoURL: git@github.com:kaweezle/iknite.git
    targetRevision: deploy/ama/local
    plugin:
      # Helmfile environment variables
      env:
      # We have resources in multiple namespaces
      # - name: HELMFILE_USE_CONTEXT_NAMESPACE
      #   value: "true"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
