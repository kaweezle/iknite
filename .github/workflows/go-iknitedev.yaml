# cSpell: words covermode coverprofile unittests
name: "Iknitedev: Build and test with Go"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "hack/iknitedev/**"
      - ".github/workflows/go-iknitedev.yaml"


jobs:
  build:
    name: Build and test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: hack/iknitedev/go.mod
          check-latest: true
          cache: true
        id: go

      - name: Build
        working-directory: hack/iknitedev
        run: go build -v -o iknitedev

      - name: Test
        working-directory: hack/iknitedev
        run: go test -v -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        if: ${{ !cancelled() }}
        with:
          directory: hack/iknitedev
          name: iknitedev
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
