# cSpell: words covermode coverprofile unittests iknitectl
# The iknitectl binary is now part of the main iknite module.
# It is built and tested by the main go.yaml workflow.
# This workflow exists only to trigger CI on iknitectl-related paths.
name: "Iknitectl: Build and test with Go"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "cmd/iknitectl/**"
      - "pkg/cmd/iknitectl/**"
      - "pkg/kustomize/**"
      - "pkg/secrets/**"
      - "pkg/cmd/secrets/**"
      - ".github/workflows/go-iknitectl.yaml"

jobs:
  build:
    name: Build and test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true
        id: go

      - name: Build
        run: go build -v ./cmd/iknitectl/...

      - name: Test
        run: go test -v -race -covermode=atomic -coverprofile=coverage.out ./pkg/cmd/iknitectl/... ./pkg/kustomize/... ./pkg/secrets/... ./pkg/cmd/secrets/...

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          name: iknitectl
          flags: unittests
