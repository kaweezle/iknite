apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: iknite
  name: iknite-bootstrap-test
  namespace: kube-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iknite
      component: bootstrap-test
  template:
    metadata:
      labels:
        app: iknite
        component: bootstrap-test
    spec:
      serviceAccountName: iknite-bootstrap-admin
      automountServiceAccountToken: true
      volumes:
        - name: bootstrap-data
          hostPath:
            path: /opt/iknite/bootstrap
            type: DirectoryOrCreate
      containers:
        - name: iknite-bootstrap
          image: ghcr.io/kaweezle/iknite-bootstrap:v0.7.1-devel
          imagePullPolicy: Always
          args:
            - /bin/bash
            - -c
            - |
              echo "Starting bootstrap test container"
              trap '' TERM INT
              sleep infinity &
              wait
          env:
            - name: KUBEWAIT_ALL_NAMESPACES
              value: "1"
          volumeMounts:
            - mountPath: /workspace
              name: bootstrap-data
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
